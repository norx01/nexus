<!DOCTYPE html>
<html lang="es">
<head>
    <title>Lista de Usuarios</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>
<!-- Contenido principal -->
<div style="padding: 20px;">

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Pricing</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <h1 class="text-success">Lista de Usuarios</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <a th:href="@{/view/usuarios/form}" class="btn btn-primary mb-3">📝 Registrar Cliente</a>
    <a th:href="@{/view/usuarios/pdf}" class="btn btn-danger mb-3">📝 Exportar PDF</a>
    <a th:href="@{/view/usuarios/excel}" class="btn btn-success mb-3">📝 Exportar Excel</a>

    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-info">
            <tr class="centrado">
                <th>⚙️</th>
                <th>ID Usuarios</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Fecha</th>
                <th>DNI</th>
                <th>Correo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td>
                    <a th:href="@{'/view/usuarios/edit/' + ${usuario.id_usuario}}" class="btn btn-outline-light btn-sm">✏️</a>
                    <form th:action="@{'/view/usuarios/delete/' + ${usuario.id_usuario}}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-outline-light btn-sm"
                                onclick="return confirm('¿Está seguro que desea eliminar este Usuario?')">
                            🗑️
                        </button>
                    </form>
                </td>
                <td th:text="${usuario.id_usuario}"></td>
                <td th:text="${usuario.nombre}"></td>
                <td th:text="${usuario.apellido}"></td>
                <td th:text="${usuario.fecha}"></td>
                <td th:text="${usuario.dni}"></td>
                <td th:text="${usuario.correo}"></td>
            </tr>
            </tbody>
        </table>

    </div>

</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
