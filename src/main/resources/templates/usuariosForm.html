<!DOCTYPE html>
<html lang="es">
<head>
    <title>Lista de Usuarios</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- js personalizado -->
    <script src=""></script>
</head>
<!-- Contenido principal -->
<div style="padding: 20px;">


    <!-- Título dinámico -->
    <h1 class="text-info" th:text="${usuarios.id_usuario == null} ? 'Registrar Usuario' : 'Editar Usuario'"></h1>

    <!-- Formulario de guardado -->
    <form th:action="@{/view/usuarios/save}" th:object="${usuarios}" method="post" novalidate>
        <!-- Campo oculto para conservar el ID al editar -->
        <input type="hidden" th:field="*{id_usuario}" />

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" th:field="*{apellido}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" th:field="*{fecha}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="number" th:field="*{dni}" class="form-control" min="1" max="999" required />
        </div>


        <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="text" th:field="*{correo}" class="form-control" required />
        </div>

        <!-- Botones -->
        <button type="submit" class="btn btn-info">Guardar</button>
        <a th:href="@{/view/usuarios}" class="btn btn-secondary">Volver</a>
    </form>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
